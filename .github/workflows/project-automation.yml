name: Project Automation

# Handles cases that built-in GitHub Project workflows can't cover.
#
# Built-in workflows (enable in project settings UI) handle:
#   Item added to project   → Backlog
#   Item closed             → Done
#   Item reopened           → Todo
#   PR linked to issue      → In Review
#   PR merged               → Done
#   Auto-close issue        → board "Done" closes the issue (bidirectional)
#   Code changes requested  → In Progress
#   Code review approved    → In Review
#   Auto-add to project     → adds new repo issues automatically
#
# This workflow handles what built-ins can't:
#   Issue assigned          → In Progress
#   Issue unassigned        → Todo (if no assignees left)
#   Issue closed not_planned→ Invalid (overrides built-in "Done")
#   PR closed without merge → linked issues back to Todo

on:
  issues:
    types: [assigned, unassigned, closed]
  pull_request:
    types: [closed]

env:
  GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
  PROJECT_OWNER: lernza
  PROJECT_NUMBER: "1"
  STATUS_FIELD_ID: "PVTSSF_lADOC20SDc4BRpIZzg_aUc4"
  PROJECT_ID: "PVT_kwDOC20SDc4BRpIZ"
  STATUS_TODO: "fb5b0bc3"
  STATUS_IN_PROGRESS: "8b6279b2"
  STATUS_INVALID: "bf0b7b0b"

jobs:
  # ─── Issue assigned → In Progress ──────────────────────────────
  issue-assigned:
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move to In Progress
        run: |
          # Ensure issue is in project (add if missing)
          ITEM_ID=$(gh project item-add $PROJECT_NUMBER \
            --owner $PROJECT_OWNER \
            --url "${{ github.event.issue.html_url }}" \
            --format json | jq -r '.id')

          gh api graphql -f query="
            mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: \"$PROJECT_ID\"
                itemId: \"$ITEM_ID\"
                fieldId: \"$STATUS_FIELD_ID\"
                value: { singleSelectOptionId: \"$STATUS_IN_PROGRESS\" }
              }) { projectV2Item { id } }
            }"

          echo "Moved #${{ github.event.issue.number }} to In Progress"

  # ─── Issue unassigned → Todo (if no assignees left) ────────────
  issue-unassigned:
    if: github.event_name == 'issues' && github.event.action == 'unassigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move back to Todo if no assignees remain
        run: |
          ASSIGNEE_COUNT=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} --json assignees -q '.assignees | length')

          if [ "$ASSIGNEE_COUNT" -eq 0 ]; then
            ITEM_ID=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "${{ github.event.issue.number }}" \
              '.items[] | select(.content.number == ($N|tonumber)) | .id')

            if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
              gh api graphql -f query="
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: \"$PROJECT_ID\"
                    itemId: \"$ITEM_ID\"
                    fieldId: \"$STATUS_FIELD_ID\"
                    value: { singleSelectOptionId: \"$STATUS_TODO\" }
                  }) { projectV2Item { id } }
                }"

              echo "Moved #${{ github.event.issue.number }} back to Todo (no assignees)"
            fi
          else
            echo "Issue still has $ASSIGNEE_COUNT assignee(s), staying In Progress"
          fi

  # ─── Issue closed as "not planned" → Invalid ───────────────────
  # The built-in "Item closed" workflow sets Done for all closes.
  # This overrides that for issues closed as "not planned".
  issue-closed-not-planned:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'closed' &&
      github.event.issue.state_reason == 'not_planned'
    runs-on: ubuntu-latest
    steps:
      - name: Override to Invalid
        run: |
          # Small delay to let the built-in workflow set "Done" first, then override
          sleep 3

          ITEM_ID=$(gh project item-list $PROJECT_NUMBER \
            --owner $PROJECT_OWNER --limit 200 --format json | \
            jq -r --arg N "${{ github.event.issue.number }}" \
            '.items[] | select(.content.number == ($N|tonumber)) | .id')

          if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_INVALID\" }
                }) { projectV2Item { id } }
              }"

            echo "Moved #${{ github.event.issue.number }} to Invalid (closed as not planned)"
          fi

  # ─── PR closed without merge → linked issues back to Todo ─────
  pr-closed-not-merged:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues back to Todo
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --json body -q '.body')

          ISSUE_NUMS=$(echo "$PR_BODY" | \
            grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
            grep -oE '[0-9]+' || true)

          if [ -z "$ISSUE_NUMS" ]; then
            echo "No linked issues found in PR body"
            exit 0
          fi

          for NUM in $ISSUE_NUMS; do
            ITEM_ID=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | .id')

            if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
              gh api graphql -f query="
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: \"$PROJECT_ID\"
                    itemId: \"$ITEM_ID\"
                    fieldId: \"$STATUS_FIELD_ID\"
                    value: { singleSelectOptionId: \"$STATUS_TODO\" }
                  }) { projectV2Item { id } }
                }"
              echo "Moved #$NUM back to Todo (PR closed without merge)"
            fi
          done
